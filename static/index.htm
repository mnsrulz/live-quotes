<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>SSE Demo</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        padding: 20px;
      }
      #log {
        margin-top: 12px;
        white-space: pre;
        font-family: monospace;
      }
    </style>
  </head>

  <body>
    <h1>Server Sent Events</h1>
    <div>Latest time:</div>
    <div id="latest">—</div>

    <div id="log"></div>

    <script>
      const latest = document.getElementById('latest')
      const log = document.getElementById('log')

      const es = new EventSource('/events')

      es.onmessage = (e) => {
        const data = JSON.parse(e.data)

        // update latest value
        latest.textContent = new Date(data.t).toLocaleTimeString()

        // optional: append log
        log.textContent += `${data.t} - ${data.}\n`

        // keep last ~20 lines only
        const lines = log.textContent.split('\n').slice(-20)
        log.textContent = lines.join('\n')
      }

      es.onerror = (err) => {
        console.error('SSE error', err)
        latest.textContent = 'disconnected...'
      }
    </script>
  </body>
</html>
